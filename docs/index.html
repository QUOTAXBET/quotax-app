<!DOCTYPE html>
<html lang="it">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuotaX — AI Sports Predictions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0B0F14; color: #E0E0E0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-arrow { font-size: 44px; color: #00FF88; display: block; margin-bottom: -8px; }
  .brand { display: flex; align-items: baseline; justify-content: center; }
  .brand-quota { font-size: 52px; font-weight: 900; color: #FFF; letter-spacing: -2px; }
  .brand-x { font-size: 52px; font-weight: 900; color: #00FF88; letter-spacing: -2px; }
  .brand-sub { font-size: 13px; color: #00FF88; font-weight: 700; letter-spacing: 5px; margin-top: 2px; }
  .tagline { color: #888; font-size: 14px; margin-top: 24px; text-align: center; }
  .links { display: flex; gap: 16px; margin-top: 32px; flex-wrap: wrap; justify-content: center; }
  .links a { color: #00FF88; text-decoration: none; font-size: 15px; font-weight: 600; padding: 14px 28px; border: 1.5px solid rgba(0,255,136,0.3); border-radius: 14px; transition: all 0.2s; text-align: center; min-width: 160px; }
  .links a:hover { background: rgba(0,255,136,0.1); }
  .footer { color: #555; font-size: 12px; margin-top: 48px; text-align: center; }
  .contact { color: #666; font-size: 13px; margin-top: 12px; }
  .contact a { color: #00FF88; text-decoration: none; }
  @media (max-width: 480px) {
    .brand-quota, .brand-x { font-size: 40px; }
    .logo-arrow { font-size: 36px; }
    .brand-sub { font-size: 11px; letter-spacing: 4px; }
    .links { flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    .links a { width: 100%; max-width: 280px; padding: 16px 24px; font-size: 16px; }
    .tagline { font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="logo">
    <span class="logo-arrow">↗</span>
    <div class="brand"><span class="brand-quota">Quota</span><span class="brand-x">X</span></div>

  </div>

  <p class="footer">&copy; 2025 QuotaX. Tutti i diritti riservati.</p>
